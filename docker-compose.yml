services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backloggi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backloggi_dev}
      POSTGRES_DB: ${POSTGRES_DB:-backloggi}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
